<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resumen Semanal — Supervisores</title>
  <link rel="stylesheet" href="css/styles.css?v=20260701" />
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <span class="logo">OPS</span>
      <span class="sub">Oilfield Production Services</span>
    </div>

    <a class="back" href="index.html">&larr; Volver</a>
    <div class="titulo">PLANILLA DE RESUMEN SEMANAL — SUPERVISORES DE TALLER</div>

    <form id="form">
      <!-- Cabecera -->
      <div class="card-form">
        <h2>Datos generales</h2>
        <div class="grid3">
          <div class="field">
            <label for="semana">Semana *</label>
            <select id="semana"><option value="">— Elegir —</option></select>
          </div>
          <div class="field">
            <label for="desde">Desde</label>
            <input type="text" id="desde" readonly />
          </div>
          <div class="field">
            <label for="hasta">Hasta</label>
            <input type="text" id="hasta" readonly />
          </div>
        </div>
        <div class="grid3" style="margin-top:10px">
          <div class="field">
            <label for="supervisor">Supervisor *</label>
            <select id="supervisor"><option value="">— Elegir —</option></select>
          </div>
          <div class="field">
            <label for="ubicacion">Ubicación</label>
            <input type="text" id="ubicacion" readonly />
          </div>
          <div class="field">
            <label for="taller">Taller</label>
            <input type="text" id="taller" readonly />
          </div>
        </div>
      </div>

      <!-- Indicadores -->
      <div class="card-form">
        <h2>Indicadores de la semana</h2>
        <div class="grid3">
          <div class="field"><label for="cant_mecanicos">Cantidad de Mecánicos <small>(auto)</small></label>
            <div class="campo-conbtn"><input type="number" id="cant_mecanicos" readonly /><button type="button" class="ghost small" id="ver-mecanicos">Ver listado</button></div>
          </div>
          <div class="field"><label for="ordenes">N° Órdenes Realizadas</label><input type="number" id="ordenes" min="0" /></div>
          <div class="field"><label for="tareas">N° Tareas Realizadas</label><input type="number" id="tareas" min="0" /></div>
          <div class="field"><label for="en_reparacion">En Reparación</label><input type="number" id="en_reparacion" min="0" /></div>
          <div class="field"><label for="tercerizado">Tercerizado</label><input type="number" id="tercerizado" min="0" /></div>
        </div>
      </div>

      <!-- Repuestos en espera -->
      <div class="card-form">
        <h2>Repuestos en espera</h2>
        <table class="grid" id="tabla-repuestos">
          <thead>
            <tr><th>N°</th><th>Dominio</th><th>Repuesto</th><th>Fecha de pedido</th><th></th></tr>
          </thead>
          <tbody></tbody>
        </table>
        <button type="button" class="ghost small" id="add-repuestos">＋ Agregar repuesto</button>
        <button type="button" class="ghost small" id="prev-repuestos">↩ Cargar de la semana anterior</button>
        <p class="auto-hint">Total repuestos en espera: <input type="number" id="espera_repuesto" class="mini" value="0" readonly /></p>
      </div>

      <!-- Necesidades -->
      <div class="card-form">
        <h2>Necesidades</h2>
        <table class="grid" id="tabla-necesidades">
          <thead>
            <tr><th>N°</th><th>Necesidad</th><th>Fecha de pedido</th><th></th></tr>
          </thead>
          <tbody></tbody>
        </table>
        <button type="button" class="ghost small" id="add-necesidades">＋ Agregar necesidad</button>
        <button type="button" class="ghost small" id="prev-necesidades">↩ Cargar de la semana anterior</button>
        <p class="auto-hint">Total necesidades: <input type="number" id="necesidades_cant" class="mini" value="0" readonly /></p>
      </div>

      <div class="actions">
        <button type="submit" class="primary">Enviar</button>
      </div>
      <div class="status" id="status"></div>
    </form>
  </div>

  <script src="js/listados.js?v=20260701"></script>
  <script src="js/config.js?v=20260701"></script>
  <script src="js/common.js?v=20260701"></script>
  <script src="js/supervisores.js?v=20260701"></script>
</body>
</html>
